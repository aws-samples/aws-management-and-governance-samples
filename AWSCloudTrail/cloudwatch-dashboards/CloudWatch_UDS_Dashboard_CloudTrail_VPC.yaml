AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Sample CloudWatch Dashboard for CloudTrail and VPC Flow Logs using CloudWatch Unified Data Store data sources.
  Supports Standard AWS and OCSF log formats. Provides security visibility for CloudTrail and VPC Flow Logs.
  Queries use SOURCE logGroups() with filterIndex @data_source_type and filterIndex @data_source_name to scope to management or data events.
  No dependency on custom log group names. READ-ONLY dashboard. Enable stack termination protection post-deployment.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Dashboard Configuration"
        Parameters:
          - DashboardName
          - LogFormat
    ParameterLabels:
      DashboardName:
        default: "Dashboard Name"
      LogFormat:
        default: "Log Format (Standard or OCSF)"


# ============================================================
# PARAMETERS 
# ============================================================
Parameters:

  DashboardName:
    Type: String
    Default: CloudTrail-VPC-Dashboard
    Description: Name for the CloudWatch Dashboard
    AllowedPattern: '[A-Za-z0-9_-]+'
    ConstraintDescription: Only alphanumeric characters, hyphens, and underscores allowed.
    MaxLength: 255
    MinLength: 1

  LogFormat:
    Type: String
    Default: Standard
    AllowedValues: [Standard, OCSF]
    Description: >
      Choose log format: Standard (native AWS CloudTrail/VPC Flow Logs) or OCSF (Open Cybersecurity Schema Framework).
      OCSF provides normalized security event data across different sources.



# ============================================================
# CONDITIONS
# ============================================================
Conditions:
  UseOCSF: !Equals [!Ref LogFormat, OCSF]
  UseStandard: !Equals [!Ref LogFormat, Standard]

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # CloudWatch Dashboard - Standard Format
  # ----------------------------------------------------------
  SecurityDashboardStandard:
    Type: AWS::CloudWatch::Dashboard
    Condition: UseStandard
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [

            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 2,
              "properties": {
                "markdown": "# 🔐 CloudWatch Dashboard for CloudTrail & VPC Flow Logs — CloudWatch Unified Data Store (Standard Format)\n\n**Data Sources:** `aws_cloudtrail` + `amazon_vpc` (auto-discovered via @data_source_name)\n\nThis dashboard provides near-real-time security visibility using standard AWS log formats via CloudWatch Unified Data Store data sources."
              }
            },

            {
              "type": "text",
              "x": 0,
              "y": 2,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "## 🚨 Security Overview"
              }
            },

            {
              "type": "log",
              "x": 0,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "📈 Error Rate Trend Over Time",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"management\"] | filterIndex @data_source_name in [\"aws_cloudtrail\"]|\n fields @timestamp, errorCode | filter ispresent(errorCode) | stats count(*) as ErrorCount by bin(5m) | sort @timestamp asc",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "🚨 Top Error Codes (Unauthorized / Access Denied)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"management\"] | filterIndex @data_source_name in [\"aws_cloudtrail\"]|\n fields @timestamp, errorCode, errorMessage, userIdentity.arn, eventName, sourceIPAddress, recipientAccountId, awsRegion | filter ispresent(errorCode) | filter errorCode in [\"AccessDenied\", \"UnauthorizedAccess\", \"Client.UnauthorizedAccess\", \"AccessDeniedException\", \"AuthFailure\"] | stats count(*) as ErrorCount by errorCode, eventName, recipientAccountId, awsRegion | sort ErrorCount desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 0,
              "y": 9,
              "width": 8,
              "height": 6,
              "properties": {
                "title": "🥧 User Identity Types",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"management\"] | filterIndex @data_source_name in [\"aws_cloudtrail\"]|\n fields userIdentity.type | stats count(*) as Count by userIdentity.type",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
