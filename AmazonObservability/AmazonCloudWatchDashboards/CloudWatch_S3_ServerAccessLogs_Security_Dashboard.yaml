AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Sample Amazon CloudWatch Dashboard for Amazon S3 Server Access Logs — Security, Compliance & Audit using Amazon CloudWatch data sources with unified data and telemetry.
  Supports Standard AWS and OCSF log formats. Provides security visibility into Amazon S3 data-plane
  activity. Queries use SOURCE logGroups() with filterIndex @data_source_type and filterIndex @data_source_name.
  No dependency on custom log group names. READ-ONLY dashboard. Enable stack termination protection post-deployment.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Dashboard Configuration"
        Parameters:
          - DashboardName
          - LogFormat
    ParameterLabels:
      DashboardName:
        default: "Dashboard Name"
      LogFormat:
        default: "Log Format (Standard or OCSF)"

# ============================================================
# PARAMETERS
# ============================================================
Parameters:

  DashboardName:
    Type: String
    Default: Amazon-S3-Server-AccessLog-Security-Dashboard
    Description: Name for the CloudWatch Dashboard.
    AllowedPattern: '[A-Za-z0-9_-]+'
    ConstraintDescription: Only alphanumeric characters, hyphens, and underscores allowed.
    MaxLength: 255
    MinLength: 1

  LogFormat:
    Type: String
    Default: Standard
    AllowedValues: [Standard, OCSF]
    Description: >
      Choose log format: Standard (native Amazon S3 Server Access Logs) or OCSF (Open Cybersecurity Schema Framework).
      OCSF provides normalized security event data across different sources.

# ============================================================
# CONDITIONS
# ============================================================
Conditions:
  UseOCSF: !Equals [!Ref LogFormat, OCSF]
  UseStandard: !Not [!Equals [!Ref LogFormat, OCSF]]

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # CloudWatch Dashboard - Standard Format
  # ----------------------------------------------------------
  S3AccessLogSecurityDashboardStandard:
    Type: AWS::CloudWatch::Dashboard
    Metadata:
      Description: "CloudWatch Dashboard for Amazon S3 Server Access Logs security monitoring using Standard AWS log format"
    Condition: UseStandard
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [

            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": {
                "markdown": "# 🪣 Amazon S3 Server Access Logs — Security, Compliance & Audit Dashboard (Standard Format)\n\n**Data Source:** `amazon_s3 / server_access` &nbsp; | &nbsp; **Region:** `${AWS::Region}`\n\nThis dashboard provides security visibility into Amazon S3 data-plane activity using Amazon S3 Server Access Logs in standard AWS format via CloudWatch Unified Data Store data sources."
              }
            },

            {
              "type": "text",
              "x": 0, "y": 2, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 📊 Security Summary Counters"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 3, "width": 6, "height": 4,
              "properties": {
                "title": "🔢 Total Requests",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | fields @timestamp | stats count(*) as TotalRequests",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 6, "y": 3, "width": 6, "height": 4,
              "properties": {
                "title": "🚫 Total Errors (4xx + 5xx)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_status >= 400 | stats count(*) as TotalErrors, count_distinct(remote_ip) as DistinctIPs, count_distinct(bucket_name) as BucketsAffected",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 3, "width": 6, "height": 4,
              "properties": {
                "title": "🔓 Anonymous Requests",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter authentication_type = \"-\" | filter operation not like /OPTIONS/ | stats count(*) as AnonymousRequests, count_distinct(remote_ip) as DistinctIPs",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 18, "y": 3, "width": 6, "height": 4,
              "properties": {
                "title": "📦 Data Downloaded (MB)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /REST\\.GET\\.OBJECT/ and http_status = 200 | stats sum(bytes_sent_size) / 1048576 as TotalMB_Downloaded, count(*) as GetRequests",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 7, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 🔍 Security Overview"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 8, "width": 12, "height": 6,
              "properties": {
                "title": "📈 Error Rate Trend Over Time (4xx + 5xx)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_status >= 400 | stats count(*) as ErrorCount by bin(5m) | sort @timestamp asc",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 8, "width": 12, "height": 6,
              "properties": {
                "title": "📋 Top Error Codes (AccessDenied, NoSuchKey, etc.)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_status >= 400 | stats count(*) as ErrorCount by error_code, http_status, operation | sort ErrorCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 0, "y": 14, "width": 8, "height": 6,
              "properties": {
                "title": "🥧 Operations Distribution",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | stats count(*) as Count by operation | sort Count desc | limit 10",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 8, "y": 14, "width": 8, "height": 6,
              "properties": {
                "title": "🥧 HTTP Status Code Distribution",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | stats count(*) as Count by http_status | sort Count desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 16, "y": 14, "width": 8, "height": 6,
              "properties": {
                "title": "🥧 Request Volume by Bucket",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | stats count(*) as Count by bucket_name | sort Count desc | limit 10",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 20, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 🔒 Access Denied & Unauthorized Access"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 21, "width": 12, "height": 6,
              "properties": {
                "title": "⚠️ Top IPs with Access Denied (403)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_status = 403 | stats count(*) as DeniedCount, count_distinct(key_name) as UniqueKeys, count_distinct(bucket_name) as Buckets by remote_ip, error_code | sort DeniedCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 21, "width": 12, "height": 6,
              "properties": {
                "title": "🔍 Top Requesters with 403 Errors",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_status = 403 | stats count(*) as DeniedCount, count_distinct(bucket_name) as Buckets by requester, operation | sort DeniedCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 0, "y": 27, "width": 12, "height": 6,
              "properties": {
                "title": "📈 Access Denied Trend Over Time",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_status = 403 | stats count(*) as DeniedCount by bin(5m) | sort @timestamp asc",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 27, "width": 12, "height": 6,
              "properties": {
                "title": "🔓 Anonymous / Unauthenticated Requests",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter authentication_type = \"-\" | filter operation not like /OPTIONS/ | fields @timestamp, bucket_name, operation, key_name, remote_ip, http_status, bytes_sent_size, user_agent | sort @timestamp desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 33, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 📦 Data Exfiltration Indicators"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 34, "width": 12, "height": 6,
              "properties": {
                "title": "📦 Top Downloaders by Volume (MB)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /REST\\.GET\\.OBJECT/ and http_status = 200 | stats sum(bytes_sent_size) / 1048576 as MB_Downloaded, count(*) as Requests, count_distinct(key_name) as UniqueObjects, count_distinct(bucket_name) as Buckets by remote_ip, requester | sort MB_Downloaded desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 34, "width": 12, "height": 6,
              "properties": {
                "title": "📈 Download Volume Trend Over Time (MB)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /REST\\.GET\\.OBJECT/ and http_status = 200 | stats sum(bytes_sent_size) / 1048576 as MB_Downloaded by bin(10m) | sort @timestamp asc",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 0, "y": 40, "width": 24, "height": 6,
              "properties": {
                "title": "🌐 External IP Downloads (Non-RFC1918)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /REST\\.GET\\.OBJECT/ and http_status = 200 | filter remote_ip not like /^10\\./ | filter remote_ip not like /^172\\.(1[6-9]|2[0-9]|3[01])\\./ | filter remote_ip not like /^192\\.168\\./ | filter remote_ip not like /^127\\./ | filter remote_ip not like /^169\\.254\\./ | filter remote_ip not like /^100\\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\\./ | stats sum(bytes_sent_size) / 1048576 as MB_Downloaded, count(*) as Requests, count_distinct(bucket_name) as Buckets by remote_ip, requester | sort MB_Downloaded desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 46, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 🗑️ Delete & Bulk Delete Monitoring"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 47, "width": 12, "height": 6,
              "properties": {
                "title": "🗑️ Bulk Delete Activity by Requester",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /DELETE/ or operation = \"REST.POST.MULTI_OBJECT_DELETE\" or operation = \"BATCH.DELETE.OBJECT\" | stats count(*) as DeleteCount, count_distinct(key_name) as UniqueObjects, count_distinct(bucket_name) as Buckets by requester, remote_ip, operation | sort DeleteCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 47, "width": 12, "height": 6,
              "properties": {
                "title": "📈 Delete Operations Trend Over Time",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /DELETE/ or operation = \"REST.POST.MULTI_OBJECT_DELETE\" or operation = \"BATCH.DELETE.OBJECT\" | stats count(*) as DeleteCount by bin(10m) | sort @timestamp asc",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 53, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 🌍 Source Region & IP Analysis"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 54, "width": 12, "height": 6,
              "properties": {
                "title": "🌐 Requests by Source Region",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter source_region != \"-\" | stats count(*) as RequestCount, count_distinct(remote_ip) as UniqueIPs by source_region | sort RequestCount desc | limit 20",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "bar",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 54, "width": 12, "height": 6,
              "properties": {
                "title": "🔍 Top Source IPs by Request Volume",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | stats count(*) as RequestCount, sum(bytes_sent_size) / 1048576 as MB_Sent, count_distinct(bucket_name) as Buckets by remote_ip | sort RequestCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 60, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 🔐 TLS & Encryption Compliance"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 61, "width": 8, "height": 6,
              "properties": {
                "title": "🥧 TLS Version Distribution",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter tls_version != \"-\" | stats count(*) as Count by tls_version | sort Count desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 8, "y": 61, "width": 8, "height": 6,
              "properties": {
                "title": "🥧 Cipher Suite Distribution",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter cipher_suite != \"-\" | stats count(*) as Count by cipher_suite | sort Count desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 16, "y": 61, "width": 8, "height": 6,
              "properties": {
                "title": "🥧 Signature Version Distribution",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter signature_version != \"-\" | stats count(*) as Count by signature_version | sort Count desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 0, "y": 67, "width": 12, "height": 6,
              "properties": {
                "title": "⚠️ Outdated TLS (1.0 / 1.1) — Clients to Upgrade",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter tls_version in [\"TLSv1\", \"TLSv1.1\"] | stats count(*) as OutdatedTLS by tls_version, cipher_suite, remote_ip, requester, user_agent, bucket_name | sort OutdatedTLS desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 67, "width": 12, "height": 6,
              "properties": {
                "title": "⚠️ Deprecated Signature Version (SigV2)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter signature_version = \"SigV2\" | stats count(*) as SigV2Count by requester, remote_ip, user_agent, bucket_name, operation | sort SigV2Count desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 73, "width": 24, "height": 1,
              "properties": {
                "markdown": "## ♻️ Lifecycle & Retention Compliance"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 74, "width": 12, "height": 6,
              "properties": {
                "title": "📊 S3 Lifecycle Operations by Type",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /^S3\\./ | stats count(*) as EventCount by operation, bucket_name | sort EventCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 12, "y": 74, "width": 12, "height": 6,
              "properties": {
                "title": "📈 Lifecycle Operations Trend Over Time",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter operation like /^S3\\./ | stats count(*) as EventCount by bin(1h), operation | sort @timestamp asc | limit 200",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": true
              }
            },

            {
              "type": "log",
              "x": 0, "y": 80, "width": 12, "height": 6,
              "properties": {
                "title": "✅ ACL-Required Requests (Legacy Access)",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter acl_required = 1 | stats count(*) as ACLCount by bucket_name, operation, requester | sort ACLCount desc | limit 25",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

            {
