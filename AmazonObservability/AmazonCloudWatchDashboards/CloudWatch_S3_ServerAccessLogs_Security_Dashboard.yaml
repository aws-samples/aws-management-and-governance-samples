                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter tls.version != \"-\" | stats count(*) as Count by tls.version | sort Count desc | limit 50",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "pie",
                "stacked": false
