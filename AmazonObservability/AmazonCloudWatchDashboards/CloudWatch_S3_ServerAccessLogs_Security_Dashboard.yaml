  # ----------------------------------------------------------
  # CloudWatch Dashboard - OCSF Format
  # ----------------------------------------------------------
  S3AccessLogSecurityDashboardOCSF:
    Type: AWS::CloudWatch::Dashboard
    Metadata:
      Description: "CloudWatch Dashboard for Amazon S3 Server Access Logs security monitoring using OCSF log format"
    Condition: UseOCSF
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [

            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": {
                "markdown": "# 🪣 Amazon S3 Server Access Logs — Security, Compliance & Audit Dashboard (OCSF Format)\n\n**Data Source:** `amazon_s3 / server_access` &nbsp; | &nbsp; **Region:** `${AWS::Region}`\n\nThis dashboard provides security visibility into Amazon S3 data-plane activity using Amazon S3 Server Access Logs in OCSF (Open Cybersecurity Schema Framework) normalized format via CloudWatch Unified Data Store data sources."
              }
            },

            {
              "type": "text",
              "x": 0, "y": 2, "width": 24, "height": 1,
              "properties": {
                "markdown": "## 📊 Security Summary Counters (OCSF)"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 3, "width": 6, "height": 4,
              "properties": {
                "title": "🔢 Total Requests",
                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | fields @timestamp | stats count(*) as TotalRequests",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false
              }
            },

