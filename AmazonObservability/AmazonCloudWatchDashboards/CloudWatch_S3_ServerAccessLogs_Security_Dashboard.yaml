                "query": "SOURCE logGroups() | filterIndex @data_source_type in [\"server_access\"] | filterIndex @data_source_name in [\"amazon_s3\"] | filter http_response.code >= 400 | stats count(*) as TotalErrors, count_distinct(src_endpoint.ip) as DistinctIPs, count_distinct(unmapped.bucket_name) as BucketsAffected",
                "queryBy": "logGroupName",
                "logGroupPrefixes": {"logClass": "STANDARD", "logGroupPrefix": [], "accountIds": ["All"]},
                "region": "${AWS::Region}",
                "view": "table",
